<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componentes de Integración Sistémica</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Canvas de partículas -->
    <canvas id="bgCanvas"></canvas>

    <!-- Ticker de Información Superior -->
    <div class="info-ticker-container">
        <div class="info-ticker-wrapper">
            <div class="info-ticker-content" id="infoTickerContent">
                <i class="fas fa-circle-info ticker-icon"></i>
                <span class="ticker-text">Bienvenido a los Componentes de Integración Sistémica</span>
            </div>
        </div>
    </div>

    <!-- Contenido principal -->
    <div class="main-wrapper">
        <div class="circle-map-wrapper" id="circleMapWrapper">
            <div class="circle-map" id="circleMap">

            <!-- Haz de luz rotante (elemento dedicado para compatibilidad móvil) -->
            <div class="light-beam" aria-hidden="true"></div>

            <!-- SVG: Órbita y líneas conectoras -->
            <svg class="connectors-svg" viewBox="0 0 100 100" preserveAspectRatio="none" id="svgConnectors">
                <!-- Anillo orbital exterior -->
                <circle class="orbit-ring entering" cx="50" cy="50" r="42" style="animation-delay: 0.3s" />
                <!-- Anillo orbital interior decorativo -->
                <circle class="orbit-ring-inner entering" cx="50" cy="50" r="28" style="opacity:0; animation: lineAppear 1s ease 1.5s forwards" />
                <!-- Líneas conectoras generadas por JS -->
            </svg>

            <!-- Título central -->
            <div class="center-title entering" id="centerTitle" style="animation-delay: 1s">
                <div class="center-title-box" style="position:relative">
                    <h1>
                        <span class="title-text">Componentes de<br>Integración Sistémica</span>
                        <small class="title-text">8 ejes estratégicos</small>
                    </h1>
                </div>
            </div>

            <!-- Botones generados por JS -->
            </div>
        </div>
    </div>

    <!-- Modal 1: Componentes y Subtemas -->
    <div class="modal fade" id="componentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content" id="modalContent">
                <div class="modal-accent-bar" id="modalAccentBar"></div>
                <div class="modal-header">
                    <div class="modal-header-icon" id="modalHeaderIcon">
                        <i class="fas fa-cube"></i>
                    </div>
                    <h5 class="modal-title" id="modalTitle">Componente</h5>
                    <button type="button" class="btn-close ms-auto" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <div class="subtemas-label">Subtemas</div>
                    <div class="subtemas-buttons" id="subtemasButtons"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cerrar" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal 2: Contenido del Subtema -->
    <div class="modal fade" id="contentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl modal-dialog-scrollable">
            <div class="modal-content" id="contentModalContent">
                <div class="modal-accent-bar" id="contentModalAccentBar"></div>
                <div class="modal-header sticky-top bg-white">
                    <div class="modal-header-icon" id="contentModalHeaderIcon">
                        <i class="fas fa-file-alt"></i>
                    </div>
                    <h5 class="modal-title" id="contentModalTitle">Subtema</h5>
                    <button type="button" class="btn-close ms-auto" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body" id="contentModalBody" tabindex="0">
                    <div id="contentText"></div>
                </div>
                <div class="modal-footer sticky-bottom bg-white">
                    <button type="button" class="btn-cerrar" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-bottom-content" aria-label="Footer">
        <span class="creator-credit">
            Website by
            <a class="footer-creator-link" href="https://maat444.github.io/divheadstudio/" target="_blank" rel="noopener noreferrer" title="Visitar Div/Head Studio">
                <img src="logodivhead.webp" alt="Div/Head Logo" class="footer-creator-logo" loading="lazy" />
            </a>
        </span>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>

    <script src="script.js"></script>
</body>
</html>
